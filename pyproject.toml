[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nuanic-ring"
version = "0.1.0"
description = "Nuanic and Moodmetric BLE ring data extraction SDK"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "bleak>=3.0.0",
    "numpy>=2.4.3",
    "matplotlib>=3.10.8",
    "scipy>=1.17.1",
    "pandas>=3.0.1",
    "rich>=14.3.3"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.20",
    "black>=23.0"
]

[project.scripts]
nuanic-ring-monitor = "nuanic_ring.cli_entrypoints:ring_monitor"
nuanic-ring-analyzer = "nuanic_ring.cli_entrypoints:ring_analyzer"
nuanic-ring-post-analysis = "nuanic_ring.cli_entrypoints:ring_post_analysis"
nuanic-ring-discover = "nuanic_ring.cli_entrypoints:ring_discover_services"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88
target-version = ['py310']
